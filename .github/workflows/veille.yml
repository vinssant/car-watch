name: 🚗 car-watch — Veille automatique

on:
  schedule:
    - cron: '0 6 * * *'
    - cron: '30 5 * * 1'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Mode : normal | test | digest | modele'
        required: false
        default: 'normal'
      modele:
        description: 'ID modèle spécifique'
        required: false
        default: ''

jobs:
  car-watch:
    name: Veille marché automobile
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main
          fetch-depth: 0

      - name: 🐍 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Dépendances
        run: pip install -r requirements.txt

      - name: ⚙️ Créer config.py
        env:
          EMAIL_DESTINATAIRE: ${{ secrets.EMAIL_DESTINATAIRE }}
        run: |
          cat > config.py << PYEOF
          EMAIL_DESTINATAIRE = "$EMAIL_DESTINATAIRE"

          SCORING_DEFAULT = {
              "annee"           : 0.20,
              "kilometrage"     : 0.25,
              "prix_vs_marche"  : 0.20,
              "garantie"        : 0.15,
              "equipements_cles": 0.10,
              "fiabilite_source": 0.10,
          }

          SCORE_URGENT = 85
          SCORE_ALERTE = 70
          SCORE_INFO   = 50

          SOURCES_FIABILITE = {
              "mercedes_certified": 10,
              "bmw_certified"     : 10,
              "autohero"          : 8,
              "aramisauto"        : 8,
              "spoticar"          : 7,
              "elite_auto"        : 7,
              "capcar"            : 7,
              "autouncle"         : 6,
              "autoscout24"       : 6,
              "autoscout24_nas"   : 6,
              "lacentrale"        : 6,
              "leparking"         : 6,
              "leboncoin"         : 5,
              "gmail_parser"      : 5,
          }
          PYEOF

      - name: 🧪 Mode test
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'test'
        env:
          GMAIL_TOKEN: ${{ secrets.GMAIL_TOKEN }}
        run: python3 main.py --test

      - name: 🔍 Veille quotidienne
        if: github.event.schedule == '0 6 * * *' || (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'normal')
        env:
          GMAIL_TOKEN: ${{ secrets.GMAIL_TOKEN }}
        run: python3 main.py

      - name: 📊 Digest hebdomadaire
        if: github.event.schedule == '30 5 * * 1' || (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'digest')
        env:
          GMAIL_TOKEN: ${{ secrets.GMAIL_TOKEN }}
        run: python3 main.py --digest

      - name: 🎯 Modèle spécifique
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'modele' && github.event.inputs.modele != ''
        env:
          GMAIL_TOKEN: ${{ secrets.GMAIL_TOKEN }}
        run: python3 main.py --modele ${{ github.event.inputs.modele }}

      - name: 💾 Commit historique
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "📊 car-watch — historique $(date +'%d/%m/%Y %H:%M')"
          file_pattern: "data/**/*.json"
          commit_author: "car-watch bot <bot@github.com>"
